<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生成你的旅行小红书</title>
  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial;
      background:#fafafa;
      text-align:center;
      padding:24px;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      max-width:520px;
      margin:0 auto;
    }
    h2{ margin:8px 0 10px; }
    p{ margin:0 0 14px; color:#444; }
    button{
      width:100%;
      padding:14px 12px;
      margin-top:12px;
      border:none;
      border-radius:12px;
      font-size:16px;
      background:#ff2442;
      color:#fff;
      font-weight:600;
    }
    button.secondary{
      background:#111;
    }
    button.ghost{
      background:#fff;
      color:#ff2442;
      border:1px solid #ff2442;
    }
    button:disabled{
      opacity:.6;
    }
    #result{
      white-space:pre-wrap;
      text-align:left;
      margin-top:16px;
      padding:12px;
      background:#f6f6f6;
      border-radius:12px;
      min-height:110px;
      font-size:14px;
      line-height:1.5;
      color:#111;
    }
    .hint{
      font-size:12px;
      color:#666;
      text-align:left;
      margin-top:10px;
      line-height:1.5;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      font-size:14px;
      margin-top:10px;
      outline:none;
    }
    .row{
      display:flex;
      gap:10px;
      margin-top:10px;
    }
    .row button{
      margin-top:0;
      width:50%;
      padding:12px;
      font-size:14px;
    }
    .badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:#fff0f2;
      color:#ff2442;
      font-size:12px;
      margin-bottom:10px;
    }
  </style>
</head>

<body>
  <h2>✨ 一键生成入住评论</h2>

  <div class="card">
    <div class="badge">操作步骤:生成 → 复制 → 跳转发布</div>
    <p>点击生成属于你的入住分享</p>

    <!-- 可选：本地临时存 key（仅自测用，线上请走后端） -->
    <input id="keyInput" type="password"/>

    <div class="row">
      <button class="ghost" onclick="saveKey()">保存 Key</button>
      <button class="ghost" onclick="clearKey()">清除 Key</button>
    </div>

    <button id="btnGen" onclick="generate()">生成入住评论</button>
    <button class="secondary" onclick="copyText()">复制文案</button>
    <button onclick="openXHS()">一键跳转到小红书发布</button>

    <div id="result">等待生成…</div>

    <div class="hint">
      <div>⚠️ 提醒：</div>
      <div>1) 本页面会“生成后尝试自动复制”，失败也可手动点“复制文案”。</div>
    </div>
  </div>

<script>
  let generatedText = "";
  let isGenerating = false;

  function setStatus(text){
    document.getElementById("result").innerText = text;
  }

  function getDeepseekKey(){
    // 优先读取 window 注入，其次读 localStorage（仅自测）
    const injected = (window.DEEPSEEK_API_KEY || "").trim();
    if (injected) return injected;

    const saved = (localStorage.getItem("DEEPSEEK_API_KEY") || "").trim();
    return saved;
  }

  function saveKey(){
    const v = (document.getElementById("keyInput").value || "").trim();
    if (!v){
      alert("请先在输入框粘贴 Key。");
      return;
    }
    localStorage.setItem("DEEPSEEK_API_KEY", v);
  }

  function clearKey(){
    localStorage.removeItem("DEEPSEEK_API_KEY");
    document.getElementById("keyInput").value = "";
  }

  async function generate(){
    if (isGenerating) return;

    const apiKey = getDeepseekKey();
    if (!apiKey){
      setStatus("未检测到 DeepSeek Key。\n\n方式A：在输入框粘贴后点“保存 Key”\n方式B：控制台执行：window.DEEPSEEK_API_KEY = \"你的key\"");
      return;
    }

    isGenerating = true;
    document.getElementById("btnGen").disabled = true;

    setStatus("正在生成中...\n（若超过20秒没返回，多为网络/CORS/Key/额度/接口问题）");

    const prompt = `
请写一篇适合小红书发布的真实入住体验分享,并且不能忽略以下任何一个要求：

地点：拉萨
场景：旅行入住体验
风格：真实、轻松、有生活感

输出格式：
吸引人的标题（每个不超过 15 字）
正文（分段、口吻自然，可带表情,不超过500字）
推荐标签（#开头，3-5个）
`.trim();

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 20000);

    try{
      const res = await fetch("https://api.deepseek.com/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.8,
          stream: false
        }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      // 不是 2xx：把返回体展示出来（定位 401/403/429 非常关键）
      if (!res.ok){
        let bodyText = "";
        try { bodyText = await res.text(); } catch(e) {}
        setStatus(`请求失败：HTTP ${res.status} ${res.statusText}\n\n${bodyText}`);
        return;
      }

      const data = await res.json();
      const content = data?.choices?.[0]?.message?.content;

      if (!content){
        setStatus("请求成功但没有拿到 content。\n\n返回：\n" + JSON.stringify(data, null, 2));
        return;
      }

      generatedText = content;
      setStatus(generatedText);

      // 生成成功后：尝试自动复制一次（iOS 可能因权限失败，不影响后续手动复制）
      try { await navigator.clipboard.writeText(generatedText); } catch(e) {}

    }catch(e){
      if (e?.name === "AbortError"){
        setStatus("请求超时（20秒）。\n\n可能原因：网络被拦截 / 接口不可达 / 浏览器跨域限制。\n建议打开 Safari 开发者工具看 Network/Console。");
      } else {
        setStatus("生成失败：" + (e?.message || e));
      }
    }finally{
      isGenerating = false;
      document.getElementById("btnGen").disabled = false;
    }
  }

  async function copyText(){
    if (!generatedText.trim()){
      alert("还没有生成内容哦，先点“生成我的旅行笔记”。");
      return;
    }

    try{
      await navigator.clipboard.writeText(generatedText);
      alert("已复制文案 ✅ 打开小红书后可直接粘贴！");
    }catch(e){
      // iOS 在非 https / 权限不足时可能失败
      alert("复制失败（可能需要 HTTPS 或权限）。\n你可以长按下方内容手动全选复制。");
    }
  }

  function openXHS(){
    // 先尽量把文案复制好（不阻断跳转）
    if (generatedText.trim()){
      navigator.clipboard.writeText(generatedText).catch(()=>{});
    }

    // iOS：尝试多个 scheme 直达发布页，失败就至少打开小红书
    const candidates = [
      "xhsdiscover://post_note?ignore_draft=true",
      "xhsdiscover://post_note",
      "xhsdiscover://post",
      "xhsdiscover://"
    ];

    let i = 0;
    const start = Date.now();

    const tryOpen = () => {
      if (i >= candidates.length){
        alert("已尝试跳转，但可能因 iOS/小红书限制无法直达发布页。\n已为你复制文案：打开小红书后点“+”发布并粘贴即可。");
        return;
      }
      window.location.href = candidates[i++];

      // 给系统一点时间处理跳转；Safari 可能限制连续多次跳转，所以做短延迟兜底
      setTimeout(() => {
        // 如果 2.5 秒内仍停留网页（未切走），继续尝试下一个
        if (Date.now() - start < 2500) tryOpen();
      }, 600);
    };

    tryOpen();
  }
</script>
</body>
</html>
