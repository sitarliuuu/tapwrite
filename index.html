<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游牧地球民宿入住快捷助手</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial;
      background:#eef3ff;
      color:#111;
      padding:20px 16px 32px;
      text-align:center;
    }
    .page{
      max-width:520px;
      margin:0 auto;
    }
    .hero{
      text-align:center;
      background:linear-gradient(180deg,#f7f9ff 0%,#edf2ff 100%);
      border-radius:24px;
      padding:32px 20px 24px;
      margin-bottom:18px;
    }
    .hero h1{
      margin:0;
      font-size:34px;
      line-height:1.2;
      color:#1d2755;
      font-weight:700;
      letter-spacing:1px;
    }
    .hero p{
      margin:12px 0 0;
      font-size:16px;
      color:#5a648a;
    }
    .panel-kicker{
      margin:0 0 8px;
      font-size:12px;
      line-height:1;
      font-weight:600;
      color:#5a648a;
      letter-spacing:1px;
    }
    .panel{
      background:#fff;
      border-radius:24px;
      padding:18px;
      box-shadow:0 10px 28px rgba(29,39,85,.08);
      margin-bottom:18px;
      text-align:left;
    }
    .panel-title{
      margin:0 0 6px;
      font-size:18px;
      font-weight:700;
      color:#111;
    }
    .panel-desc{
      margin:0;
      font-size:13px;
      color:#888;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:16px;
    }
    .tile{
      background:#fff;
      border-radius:24px;
      padding:18px 16px;
      box-shadow:0 10px 28px rgba(29,39,85,.08);
      text-align:left;
      cursor:pointer;
    }
    .tile-icon{
      width:56px;
      height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 14px;
    }
    .tile-icon img{
      width:28px;
      height:28px;
      object-fit:contain;
    }
    .icon-xhs{ background:#ffe8ed; }
    .icon-dp{ background:#fff0e6; }
    .icon-ctrip{ background:#e8f1ff; }
    .icon-qunar{ background:#e8f7f7; }
    .icon-dy{ background:#eef1ff; }
    .icon-mt{ background:#fff7cf; }
    .icon-wifi{ background:#e8f3ff; }
    .icon-wx{ background:#e9f9e8; }
    .icon-channel{ background:#eef6ef; }
    .tile h3{
      margin:0 0 8px;
      font-size:16px;
      line-height:1.35;
      color:#111;
      text-align:center;
    }
    .tile p{
      margin:0;
      font-size:12px;
      line-height:1.5;
      color:#909090;
      min-height:36px;
      text-align:center;
    }
    button{
      width:100%;
      padding:12px 12px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      font-size:14px;
      font-weight:600;
      background:#ff2442;
      color:#fff;
    }
    button.secondary{ background:#111; }
    button.ghost{
      background:#fff;
      color:#ff2442;
      border:1px solid #ff2442;
    }
    button:disabled{ opacity:.6; }
    .toolbar{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:12px;
    }
    .toolbar button{ margin-top:0; }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #d9def0;
      font-size:14px;
      margin-top:12px;
      outline:none;
      background:#fff;
    }
    #result{
      display:none;
      white-space:pre-wrap;
      text-align:left;
      margin-top:14px;
      padding:14px;
      background:#f7f8fc;
      border-radius:16px;
      min-height:120px;
      font-size:14px;
      line-height:1.6;
      color:#111;
      border:1px solid #edf0f7;
    }
    .hint{
      font-size:12px;
      color:#666;
      text-align:left;
      margin-top:12px;
      line-height:1.6;
    }
    .section-title{
      margin:0 0 12px;
      font-size:16px;
      font-weight:700;
      color:#32406d;
    }
    .wx-mask{
      position:fixed;
      inset:0;
      background:linear-gradient(180deg,#f4f4f6 0%,#eef1f7 100%);
      display:none;
      align-items:flex-start;
      justify-content:center;
      padding:40px 24px 28px;
      z-index:9999;
      overflow:hidden;
    }
    .wx-mask.show{ display:flex; }
    .wx-mask-inner{
      width:100%;
      max-width:420px;
      text-align:center;
      position:relative;
      color:#2f2f2f;
      transform:translateY(-16%);
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .wx-mask-close{
      display:none;
    }
    .wx-mask-more{
      position:absolute;
      right:0;
      top:2px;
      width:48px;
      height:36px;
      border:none;
      border-radius:12px;
      background:#e5e5e7;
      color:#666;
      font-size:24px;
      line-height:36px;
      padding:0;
      margin:0;
      cursor:default;
    }
    .wx-mask-title{
      margin:88px 0 18px;
      font-size:30px;
      line-height:1.2;
      font-weight:700;
      color:#2f2f2f;
    }
    .wx-mask-desc{
      margin:0;
      font-size:17px;
      line-height:1.9;
      color:#4a4a4a;
    }
    .wx-mask-desc .highlight{
      color:#1677ff;
      font-weight:600;
    }
    .wx-arrow{
      position:absolute;
      right:20px;
      top:84px;
      width:96px;
      height:180px;
      pointer-events:none;
    }
    .wx-phone{
      width:220px;
      height:400px;
      margin:28px auto 0;
      border:10px solid rgba(255,255,255,.9);
      border-radius:38px;
      position:relative;
      background:rgba(255,255,255,.22);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
      flex:0 0 auto;
    }
    .wx-phone-notch{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:92px;
      height:18px;
      background:rgba(255,255,255,.92);
      border-radius:0 0 14px 14px;
    }
    .wx-phone-sheet{
      position:absolute;
      left:12px;
      right:12px;
      bottom:16px;
      height:150px;
      border-radius:24px;
      background:rgba(255,255,255,.28);
    }
    .wx-phone-grid{
      position:absolute;
      left:26px;
      right:26px;
      bottom:42px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }
    .wx-phone-grid span{
      display:block;
      height:38px;
      border-radius:8px;
      background:rgba(255,255,255,.48);
    }
    .wx-phone-focus{
      position:absolute;
      left:50%;
      bottom:96px;
      transform:translateX(-50%);
      width:144px;
      height:144px;
      border-radius:50%;
      border:8px solid rgba(255,255,255,.75);
      background:rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .wx-phone-focus-inner{
      width:88px;
      text-align:center;
      color:#4a4a4a;
      font-size:14px;
      line-height:1.35;
      font-weight:600;
    }
    .wx-browser-icon{
      width:44px;
      height:44px;
      margin:0 auto 8px;
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 12px rgba(0,0,0,.06);
      font-size:24px;
    }
    .wx-mask-bottom-close{
      width:54px;
      height:54px;
      margin:20px auto 0;
      border-radius:50%;
      border:2px solid #8f8f94;
      background:transparent;
      color:#5a5a5f;
      font-size:28px;
      line-height:50px;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }
    @media (max-height:760px){
      .wx-mask{
        padding:28px 20px 22px;
      }
      .wx-mask-inner{
        transform:translateY(-12%);
      }
      .wx-mask-title{
        margin-top:72px;
      }
      .wx-phone{
        height:360px;
      }
      .wx-mask-bottom-close{
        margin-top:14px;
      }
    }
    @media (max-width:420px){
      .hero h1{ font-size:28px; }
      .grid{
        grid-template-columns:repeat(3,minmax(0,1fr));
        gap:12px;
      }
      .tile{ padding:16px 14px; }
    }
  </style>
</head>

<body>
  <div class="page">

    <section class="panel">
      <div class="panel-kicker">入住快捷助手</div>
      <h3 class="panel-title">欢迎入住游牧地球民宿</h3>
      <p class="panel-desc">很高兴与你相遇，愿你在这里住得舒服、玩得开心。下方为你准备了入住期间常用的快捷服务，点击即可使用。</p>

      <div id="result"></div>

      <div class="toolbar">
        <button id="btnGen" onclick="generate()">一键生成内容</button>
      </div>

      <div class="hint">
        <div>✨ 你可以在这里快速完成：</div>
        <div>1) 生成入住分享、点评参考内容，发小红书 / 写平台评价更方便</div>
        <div>2) 快速连接门店 WIFI，不用反复找密码</div>
        <div>3) 一键添加门店微信，咨询服务或领取更多入住信息</div>
      </div>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="tile" onclick="openXHS()">
          <div class="tile-icon icon-xhs"><img src="./images/xhs.png" alt="小红书" /></div>
          <h3>小红书</h3>
        </div>

        <div class="tile" onclick="openDouyin()">
          <div class="tile-icon icon-dy"><img src="./images/douyin.png" alt="抖音写评论" /></div>
          <h3>抖音写评论</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-wx"><img src="./images/moments.png" alt="发朋友圈" /></div>
          <h3>发朋友圈</h3>
        </div>

        <div class="tile" onclick="openCtrip()">
          <div class="tile-icon icon-ctrip"><img src="./images/ctrip.png" alt="携程" /></div>
          <h3>携程</h3>
        </div>

        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-qunar"><img src="./images/qunar.png" alt="去哪儿" /></div>
          <h3>去哪儿</h3>
        </div>

        <div class="tile" onclick="openMeituan()">
          <div class="tile-icon icon-mt"><img src="./images/meituan.png" alt="美团" /></div>
          <h3>美团</h3>
        </div>

        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-channel"><img src="./images/wx_channel.png" alt="视频号" /></div>
          <h3>关注视频号</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-dy"><img src="./images/douyin.png" alt="关注抖音" /></div>
          <h3>关注抖音</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-wx"><img src="./images/miniapp.png" alt="小程序" /></div>
          <h3>小程序</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-wx"><img src="./images/wechat.png" alt="加微信" /></div>
          <h3>加微信</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-wifi"><img src="./images/wifi.png" alt="连WIFI" /></div>
          <h3>连WIFI</h3>
        </div>
        <div class="tile" onclick="handleRestrictedEntry()">
          <div class="tile-icon icon-dp"><img src="./images/more.png" alt="更多" /></div>
          <h3>更多</h3>
        </div>
      </div>
    </section>
  </div>

  <div id="wechatMask" class="wx-mask" aria-hidden="true">
    <div class="wx-mask-inner">
      <button class="wx-mask-close" type="button" onclick="hideWechatGuide()">×</button>
      <button class="wx-mask-more" type="button" aria-label="更多">···</button>

      <svg class="wx-arrow" viewBox="0 0 120 220" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 190C20 132 42 112 76 108C108 104 111 72 108 24" stroke="#b9bbc3" stroke-width="3" stroke-linecap="round" stroke-dasharray="9 10"/>
        <path d="M100 34L108 18L116 34" stroke="#b9bbc3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <h2 class="wx-mask-title">还差1步得好礼</h2>
      <p class="wx-mask-desc">
        由于微信限制，请点击右上角 <span style="display:inline-block;background:#e5e5e7;color:#666;border-radius:10px;padding:0 10px;line-height:1.5;">···</span><br>
        选择 <span class="highlight">“在浏览器打开”</span>
      </p>

      <div class="wx-phone" aria-hidden="true">
        <div class="wx-phone-notch"></div>
        <div class="wx-phone-sheet"></div>
        <div class="wx-phone-grid">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="wx-phone-focus">
          <div class="wx-phone-focus-inner">
            <div class="wx-browser-icon">🌐</div>
            在浏览器打开
          </div>
        </div>
      </div>

      <button class="wx-mask-bottom-close" type="button" onclick="hideWechatGuide()">×</button>
    </div>
  </div>
<script>
  let generatedText = "";
  let isGenerating = false;

  function isWeChatBrowser(){
    return /MicroMessenger/i.test(window.navigator.userAgent || "");
  }

  function showWechatGuide(){
    const mask = document.getElementById("wechatMask");
    if (!mask) return;
    mask.classList.add("show");
    mask.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function hideWechatGuide(){
    const mask = document.getElementById("wechatMask");
    if (!mask) return;
    mask.classList.remove("show");
    mask.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
  }

  function guardWechatOpen(action){
    if (isWeChatBrowser()){
      showWechatGuide();
      return false;
    }
    if (typeof action === "function") {
      action();
    }
    return true;
  }

  function handleRestrictedEntry(){
    return guardWechatOpen(() => {
      alert("功能正在开发中…");
    });
  }

  function setStatus(text){
    const resultEl = document.getElementById("result");
    resultEl.style.display = "block";
    resultEl.innerText = text;
  }

  async function generate(){
    if (isGenerating) return;

    const apiKey = "sk-a1c92c976b554fc8b3b7d55776515597"

    isGenerating = true;
    document.getElementById("btnGen").disabled = true;

    setStatus("正在生成中...\n正在为你的入住分享和点评场景生成内容\n");

    const prompt = `
请写一篇适合门店评价、种草分享、短内容发布的真实入住体验文案，并且不能忽略以下任何一个要求：

地点：拉萨
场景：旅行入住体验
风格：真实、轻松、有生活感
要求：内容通用自然，适合小红书、大众点评、抖音、美团等平台使用，可直接复制后按需微调

输出要求：
直接输出最终可用内容，不要出现“标题”“正文”“推荐标签”“标题备选”等任何说明性小标题。
开头先给1个自然的标题，下一行空一行后直接接正文。
正文分段自然，口吻真实轻松，可带少量表情，不超过500字。
结尾直接补充3-5个标签（#开头），单独一行展示即可。
整体看起来像可以直接复制发布的成品文案。
`.trim();

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 20000);

    try{
      const res = await fetch("https://api.deepseek.com/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.8,
          stream: false
        }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      // 不是 2xx：把返回体展示出来（定位 401/403/429 非常关键）
      if (!res.ok){
        let bodyText = "";
        try { bodyText = await res.text(); } catch(e) {}
        setStatus(`请求失败：HTTP ${res.status} ${res.statusText}\n\n${bodyText}`);
        return;
      }

      const data = await res.json();
      const content = data?.choices?.[0]?.message?.content;

      if (!content){
        setStatus("请求成功但没有拿到 content。\n\n返回：\n" + JSON.stringify(data, null, 2));
        return;
      }

      generatedText = content;
      setStatus(generatedText);

      // 生成成功后：尝试自动复制一次（iOS 可能因权限失败，不影响后续手动复制）
      try { await navigator.clipboard.writeText(generatedText); } catch(e) {}

    }catch(e){
      if (e?.name === "AbortError"){
        setStatus("请求超时，请稍后重试。");
      } else {
        setStatus("生成失败：" + (e?.message || e));
      }
    }finally{
      isGenerating = false;
      document.getElementById("btnGen").disabled = false;
    }
  }

  async function copyText(){
    if (!generatedText.trim()){
      alert("还没有生成内容哦，请先点击“一键生成内容”。");
      return;
    }

    try{
      await navigator.clipboard.writeText(generatedText);
      alert("已复制文案 ✅ 打开小红书后可直接粘贴！");
    }catch(e){
      // iOS 在非 https / 权限不足时可能失败
      alert("复制失败！\n你可以长按下方内容手动全选复制。");
    }
  }

  function openDouyin(){
    guardWechatOpen(() => {
      const douyinStoreWebUrl = "https://life-share.scsjsd.com/falcon/poi_mwa/poi_detail?poi_id=7279650606363445289&app=aweme&biz_code=trip";
      const poiId = "7279650606363445289";
      const isIOS = /iPhone|iPad|iPod/i.test(window.navigator.userAgent || "");
      const douyinStoreAppUrl = isIOS
        ? "aweme://poi/detail?id=" + encodeURIComponent(poiId) + "&from=webview&refer=web"
        : "snssdk1128://poi/detail?id=" + encodeURIComponent(poiId) + "&from=webview&refer=web";
      const start = Date.now();

      const fallbackTimer = setTimeout(() => {
        if (Date.now() - start < 1800) {
          window.location.href = douyinStoreWebUrl;
        }
      }, 1200);

      const clearFallback = () => {
        clearTimeout(fallbackTimer);
        document.removeEventListener("visibilitychange", onVisibilityChange);
        window.removeEventListener("pagehide", clearFallback);
        window.removeEventListener("blur", clearFallback);
      };

      const onVisibilityChange = () => {
        if (document.hidden) {
          clearFallback();
        }
      };

      document.addEventListener("visibilitychange", onVisibilityChange);
      window.addEventListener("pagehide", clearFallback, { once: true });
      window.addEventListener("blur", clearFallback, { once: true });

      window.location.href = douyinStoreAppUrl;
    });
  }

  function openXHS(){
    guardWechatOpen(() => {
      if (generatedText.trim()){
        navigator.clipboard.writeText(generatedText).catch(()=>{});
      }

      const appUrl = "xhsdiscover://post_note?ignore_draft=true";

      const link = document.createElement("a");
      link.href = appUrl;
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();

      setTimeout(() => {
        link.remove();
      }, 800);
    });
  }
  function openMeituan(){
    guardWechatOpen(() => {
      const shopId = "564151165";
      const hotelH5Url = "https://i.meituan.com/awp/h5/hotel/poi/deal.html?poiId=" + shopId;
      const encodedHotelH5Url = encodeURIComponent(hotelH5Url);
      const appUrl = "imeituan://www.meituan.com/web?url=" + encodedHotelH5Url;

      const link = document.createElement("a");
      link.href = appUrl;
      link.style.display = "none";
      document.body.appendChild(link);
      link.click();

      setTimeout(() => {
        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.src = appUrl;
        document.body.appendChild(iframe);

        setTimeout(() => {
          iframe.remove();
          link.remove();
        }, 1200);
      }, 150);
    });
  }
  function openCtrip(){
    guardWechatOpen(() => {
      const hotelId = "112862059";
      const h5Url = "https://m.ctrip.com/webapp/hotel/hoteldetail/" + hotelId + ".html";
      const encodedH5ForApp = btoa(unescape(encodeURIComponent(h5Url)));
      const appUrl = "ctrip://wireless/h5?url=" + encodedH5ForApp + "&type=2";
      const start = Date.now();

      const fallbackTimer = setTimeout(() => {
        if (Date.now() - start < 1800) {
          window.location.href = h5Url;
        }
      }, 1200);

      const clearFallback = () => {
        clearTimeout(fallbackTimer);
        document.removeEventListener("visibilitychange", onVisibilityChange);
        window.removeEventListener("pagehide", clearFallback);
        window.removeEventListener("blur", clearFallback);
      };

      const onVisibilityChange = () => {
        if (document.hidden) {
          clearFallback();
        }
      };

      document.addEventListener("visibilitychange", onVisibilityChange);
      window.addEventListener("pagehide", clearFallback, { once: true });
      window.addEventListener("blur", clearFallback, { once: true });

      window.location.href = appUrl;
    });
  }
</script>
</body>
</html>
