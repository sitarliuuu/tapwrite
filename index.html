<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生成你的旅行小红书</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial;
      background:#eef3ff;
      color:#111;
      padding:20px 16px 32px;
      text-align:center;
    }
    .page{
      max-width:520px;
      margin:0 auto;
    }
    .hero{
      text-align:center;
      background:linear-gradient(180deg,#f7f9ff 0%,#edf2ff 100%);
      border-radius:24px;
      padding:32px 20px 24px;
      margin-bottom:18px;
    }
    .hero h1{
      margin:0;
      font-size:34px;
      line-height:1.2;
      color:#1d2755;
      font-weight:700;
      letter-spacing:1px;
    }
    .hero p{
      margin:12px 0 0;
      font-size:16px;
      color:#5a648a;
    }
    .panel{
      background:#fff;
      border-radius:24px;
      padding:18px;
      box-shadow:0 10px 28px rgba(29,39,85,.08);
      margin-bottom:18px;
      text-align:left;
    }
    .panel-title{
      margin:0 0 6px;
      font-size:18px;
      font-weight:700;
      color:#111;
    }
    .panel-desc{
      margin:0;
      font-size:13px;
      color:#888;
      line-height:1.5;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .tile{
      background:#fff;
      border-radius:24px;
      padding:18px 16px;
      box-shadow:0 10px 28px rgba(29,39,85,.08);
      text-align:left;
    }
    .tile-icon{
      width:56px;
      height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      margin-bottom:14px;
    }
    .icon-xhs{ background:#ffe8ed; }
    .icon-dp{ background:#fff0e6; }
    .icon-dy{ background:#eef1ff; }
    .icon-mt{ background:#fff7cf; }
    .icon-wifi{ background:#e8f3ff; }
    .icon-wx{ background:#e9f9e8; }
    .tile h3{
      margin:0 0 8px;
      font-size:16px;
      line-height:1.35;
      color:#111;
    }
    .tile p{
      margin:0 0 14px;
      font-size:12px;
      line-height:1.5;
      color:#909090;
      min-height:36px;
    }
    button{
      width:100%;
      padding:12px 12px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      font-size:14px;
      font-weight:600;
      background:#ff2442;
      color:#fff;
    }
    button.secondary{ background:#111; }
    button.ghost{
      background:#fff;
      color:#ff2442;
      border:1px solid #ff2442;
    }
    button:disabled{ opacity:.6; }
    .toolbar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    .toolbar button{ margin-top:0; }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #d9def0;
      font-size:14px;
      margin-top:12px;
      outline:none;
      background:#fff;
    }
    #result{
      white-space:pre-wrap;
      text-align:left;
      margin-top:14px;
      padding:14px;
      background:#f7f8fc;
      border-radius:16px;
      min-height:120px;
      font-size:14px;
      line-height:1.6;
      color:#111;
      border:1px solid #edf0f7;
    }
    .hint{
      font-size:12px;
      color:#666;
      text-align:left;
      margin-top:12px;
      line-height:1.6;
    }
    .section-title{
      margin:0 0 12px;
      font-size:16px;
      font-weight:700;
      color:#32406d;
    }
    @media (max-width:420px){
      .hero h1{ font-size:28px; }
      .grid{ gap:12px; }
      .tile{ padding:16px 14px; }
    }
  </style>
</head>

<body>
  <div class="page">

    <section class="panel">
      <h3 class="panel-title">AI 文案生成区</h3>
      <p class="panel-desc">可用于小红书、大众点评、抖音、美团等场景，生成后会展示在下方。</p>

      <div id="result">点击下方按钮生成通用文案，生成后可直接复制使用</div>

      <div class="toolbar">
        <button onclick="generate()">一键生成文案</button>
      </div>

      <div class="hint">
        <div>⚠️ 提醒：</div>
        <div>1) 点击下方“一键生成文案”即可生成通用内容。</div>
        <div>2) 生成后的文案可按需用于小红书、大众点评、抖音或美团等场景。</div>
      </div>
    </section>

    <section class="panel">
      <h2 class="section-title">AI 快捷工具</h2>
      <div class="grid">
        <div class="tile">
          <div class="tile-icon icon-xhs">📕</div>
          <h3>发小红书笔记</h3>
          <button id="btnGen" onclick="openXHS()">立即参与</button>
        </div>

        <div class="tile">
          <div class="tile-icon icon-mt">🟨</div>
          <h3>写美团点评文案</h3>
          <button type="button" onclick="openMeituan()">立即参与</button>
        </div>

        <div class="tile">
          <div class="tile-icon icon-dp">🍊</div>
          <h3>写大众点评评价</h3>
          <button type="button" onclick="alert('功能开发中')">立即参与</button>
        </div>

        <div class="tile">
          <div class="tile-icon icon-dy">🎵</div>
          <h3>写抖音评价</h3>
          <button type="button" onclick="alert('功能开发中')">立即参与</button>
        </div>

        <div class="tile">
          <div class="tile-icon icon-wifi">📶</div>
          <h3>连 WIFI</h3>
          <p>点击复制 WIFI 密码，连接更方便。</p>
          <button type="button" onclick="alert('功能开发中')">立即参与</button>
        </div>

        <div class="tile">
          <div class="tile-icon icon-wx">💬</div>
          <h3>加微信</h3>
          <p>添加店员微信，领取更多到店福利。</p>
          <button type="button" onclick="alert('功能开发中')">立即参与</button>
        </div>
      </div>
    </section>
  </div>
<script>
  let generatedText = "";
  let isGenerating = false;

  function setStatus(text){
    document.getElementById("result").innerText = text;
  }

  async function generate(){
    if (isGenerating) return;

    const apiKey = "sk-a1c92c976b554fc8b3b7d55776515597"

    isGenerating = true;
    document.getElementById("btnGen").disabled = true;

    setStatus("正在生成中...\n生成完成后会自动复制\n");

    const prompt = `
请写一篇适合门店评价、种草分享、短内容发布的真实入住体验文案，并且不能忽略以下任何一个要求：

地点：拉萨
场景：旅行入住体验
风格：真实、轻松、有生活感
要求：内容通用自然，适合小红书、大众点评、抖音、美团等平台使用，可直接复制后按需微调

输出要求：
直接输出最终可用内容，不要出现“标题”“正文”“推荐标签”“标题备选”等任何说明性小标题。
开头先给1个自然的标题，下一行空一行后直接接正文。
正文分段自然，口吻真实轻松，可带少量表情，不超过500字。
结尾直接补充3-5个标签（#开头），单独一行展示即可。
整体看起来像可以直接复制发布的成品文案。
`.trim();

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 20000);

    try{
      const res = await fetch("https://api.deepseek.com/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [{ role: "user", content: prompt }],
          temperature: 0.8,
          stream: false
        }),
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      // 不是 2xx：把返回体展示出来（定位 401/403/429 非常关键）
      if (!res.ok){
        let bodyText = "";
        try { bodyText = await res.text(); } catch(e) {}
        setStatus(`请求失败：HTTP ${res.status} ${res.statusText}\n\n${bodyText}`);
        return;
      }

      const data = await res.json();
      const content = data?.choices?.[0]?.message?.content;

      if (!content){
        setStatus("请求成功但没有拿到 content。\n\n返回：\n" + JSON.stringify(data, null, 2));
        return;
      }

      generatedText = content;
      setStatus(generatedText);

      // 生成成功后：尝试自动复制一次（iOS 可能因权限失败，不影响后续手动复制）
      try { await navigator.clipboard.writeText(generatedText); } catch(e) {}

    }catch(e){
      if (e?.name === "AbortError"){
        setStatus("请求超时，请稍后重试。");
      } else {
        setStatus("生成失败：" + (e?.message || e));
      }
    }finally{
      isGenerating = false;
      document.getElementById("btnGen").disabled = false;
    }
  }

  async function copyText(){
    if (!generatedText.trim()){
      alert("还没有生成内容哦，请先点击“一键生成文案”。");
      return;
    }

    try{
      await navigator.clipboard.writeText(generatedText);
      alert("已复制文案 ✅ 打开小红书后可直接粘贴！");
    }catch(e){
      // iOS 在非 https / 权限不足时可能失败
      alert("复制失败！\n你可以长按下方内容手动全选复制。");
    }
  }

  function openXHS(){
    // 先尽量把文案复制好（不阻断跳转）
    if (generatedText.trim()){
      navigator.clipboard.writeText(generatedText).catch(()=>{});
    }

    // iOS：尝试多个 scheme 直达发布页，失败就至少打开小红书
    const candidates = [
      "xhsdiscover://post_note?ignore_draft=true",
      "xhsdiscover://post_note",
      "xhsdiscover://post",
      "xhsdiscover://"
    ];

    let i = 0;
    const start = Date.now();

    const tryOpen = () => {
      if (i >= candidates.length){
        return;
      }
      window.location.href = candidates[i++];

      // 给系统一点时间处理跳转；Safari 可能限制连续多次跳转，所以做短延迟兜底
      setTimeout(() => {
        // 如果 2.5 秒内仍停留网页（未切走），继续尝试下一个
        if (Date.now() - start < 2500) tryOpen();
      }, 600);
    };

    tryOpen();
  }
  function openMeituan(){
    const shopId = "564151165";
    const hotelH5Url = "https://i.meituan.com/awp/h5/hotel/poi/deal.html?poiId=" + shopId;
    const encodedHotelH5Url = encodeURIComponent(hotelH5Url);
    const appUrl = "imeituan://www.meituan.com/web?url=" + encodedHotelH5Url;

    const link = document.createElement("a");
    link.href = appUrl;
    link.style.display = "none";
    document.body.appendChild(link);
    link.click();

    setTimeout(() => {
      const iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = appUrl;
      document.body.appendChild(iframe);

      setTimeout(() => {
        iframe.remove();
        link.remove();
      }, 1200);
    }, 150);
  }
</script>
</body>
</html>
